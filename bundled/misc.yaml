openapi: 3.0.0
info:
  description: This is the API used for general purpose operations in Mastro.
  version: 1.0.0
  title: Misc API model
  contact:
    email: info@obdasystems.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: '{protocol}://{tenant}{port}/mws/rest/mwsx'
    variables:
      protocol:
        default: https
      tenant:
        default: localhost
      port:
        default: ':8989'
security:
  - apiKey: []
  - jwt: []
paths:
  /log/{env}/{mode}:
    get:
      tags:
        - Logger
      summary: GET mwsx/log/{env}/{mode}
      operationId: setLogger
      parameters:
        - name: env
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: string
        '401':
          description: Unhauthorized
  /mastro/version:
    get:
      tags:
        - Versions
      summary: Returns the version of Mastro
      operationId: getMastroVersion
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unhauthorized
  /jena/version:
    get:
      tags:
        - Versions
      summary: Returns the version of the Jena library used by Mastro
      operationId: getJenaVersion
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unhauthorized
  /owlapi/version:
    get:
      tags:
        - Versions
      summary: Returns the version of the OWL API used by Mastro
      operationId: getOwlapiVersion
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unhauthorized
  /resources/ontologies:
    get:
      tags:
        - Resources
      summary: GET mwsx/resources/ontologies
      operationId: getResourcesIds
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unhauthorized
  /resources/ontology/{name}/versions:
    get:
      tags:
        - Resources
      summary: GET mwsx/resources/ontology/{name}/versions
      operationId: getResourcesIdsVersions
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unhauthorized
  /resources/ontology/{name}/version/mappings:
    get:
      tags:
        - Resources
      summary: GET mwsx/resources/ontology/{name}/version/mappings
      operationId: getResourcesIdsMappings
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unhauthorized
  /resources/datasources:
    get:
      tags:
        - Resources
      summary: GET mwsx/resources/datasources
      operationId: getResourcesDsIds
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unhauthorized
  /resources/endpoints:
    get:
      tags:
        - Resources
      summary: GET mwsx/resources/endpoints
      operationId: getResourcesEpIds
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unhauthorized
  /mastro/instances:
    get:
      tags:
        - Mastro
      summary: GET mwsx/mastro/instances
      operationId: getAvailableInstances
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MastroID'
        '401':
          description: Unhauthorized
  /lastLoaded/ontology:
    get:
      tags:
        - LastLoaded
      summary: GET mwsx/lastLoaded/ontology
      operationId: getLastLoadedOntology
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyOpeningEvent'
        '401':
          description: Unhauthorized
  /lastLoaded/knowledgeGraph:
    get:
      tags:
        - LastLoaded
      summary: GET mwsx/lastLoaded/knowledgeGraph
      operationId: getLastLoadedKnowledgeGraph
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KGOpeningEvent'
        '401':
          description: Unhauthorized
  /globalAnnotations:
    get:
      tags:
        - GlobalAnnotation
      summary: GET mwsx/globalAnnotations
      operationId: getGlobalAnnotations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyEntity'
        '401':
          description: Unhauthorized
  /globalAnnotation:
    post:
      tags:
        - GlobalAnnotation
      summary: POST mwsx/globalAnnotation
      operationId: postGlobalAnnotation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OntologyEntity'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyEntity'
        '401':
          description: Unhauthorized
  /globalAnnotation/{entityId}:
    delete:
      tags:
        - GlobalAnnotation
      summary: DELETE mwsx/globalAnnotation/{entityId}
      operationId: deleteGlobalAnnotation
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyEntity'
        '401':
          description: Unhauthorized
  /server/license/info:
    get:
      tags:
        - Server
      summary: Returns the license expiration date
      operationId: getServerLicenseExpirationDate
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseInfo'
        '401':
          description: Unhauthorized
  /server/license/contactInfo:
    get:
      tags:
        - Server
      summary: Returns the license contact information
      operationId: getServerLicenseContactInfo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseContactInfo'
        '401':
          description: Unauthorized
  /server/storage/report:
    get:
      tags:
        - Server
      summary: Computes and returns the system storage report
      operationId: getSystemStorageReport
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStorageReport'
        '401':
          description: Unhauthorized
  /server/storage/{folder}:
    delete:
      tags:
        - Server
      summary: Computes and returns the system storage report
      operationId: getEmptyFolder
      parameters:
        - name: folder
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemFolderDeletionReport'
        '401':
          description: Unhauthorized
  /server/systemSnapshot:
    get:
      tags:
        - Server
      summary: Computes and returns the system storage report
      operationId: getSystemSnapshot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '401':
          description: Unhauthorized
  /server/systemMemory:
    get:
      tags:
        - Server
      summary: Computes and returns the system storage report
      operationId: getSystemMemory
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '401':
          description: Unhauthorized
  /server/userlog/{username}/count:
    get:
      tags:
        - Server
      summary: Returns the user log lines count
      operationId: getUserlogCount
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: integer
        '401':
          description: Unhauthorized
  /server/userlog/{username}:
    get:
      tags:
        - Server
      summary: Returns the user log lines count
      operationId: getUserlogCountUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: length
          in: query
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/MwsxUserLogMessage'
        '401':
          description: Unhauthorized
  /geocoding/servers:
    get:
      tags:
        - Geocoding
      summary: Returns the list of available Geocoding servers
      operationId: getGeocodingServers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodingServers'
        '401':
          description: Unhauthorized
  /geocoding/server/{serverId}:
    put:
      tags:
        - Geocoding
      summary: Adds or modifies the specified Geocoding server and returns the new list of available servers
      operationId: putGeocodingServer
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeocodingServer'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodingServers'
        '401':
          description: Unhauthorized
    delete:
      tags:
        - Geocoding
      summary: Removes the specified server from the list of available servers
      operationId: deleteGeocodingServer
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeocodingServers'
        '401':
          description: Unhauthorized
  /logger/mastroapi:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger/mastroapi
      operationId: getSetMastroapiLogger
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
        '401':
          description: Unhauthorized
  /logger/service:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger/service
      operationId: getSetServiceLogger
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
        '401':
          description: Unhauthorized
  /logger:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger
      operationId: getSetLogger
      parameters:
        - name: className
          in: query
          required: true
          schema:
            type: string
        - name: packageName
          in: query
          required: true
          schema:
            type: string
        - name: logLevel
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
        '401':
          description: Unhauthorized
  /logger/class:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger/class
      operationId: getSetServiceClass
      parameters:
        - name: className
          in: query
          required: true
          schema:
            type: string
        - name: logLevel
          in: query
          required: true
          schema:
            type: string
        - name: action
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
        '401':
          description: Unhauthorized
  /logger/package:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger/package
      operationId: getSetServicePackage
      parameters:
        - name: packageName
          in: query
          required: true
          schema:
            type: string
        - name: logLevel
          in: query
          required: true
          schema:
            type: string
        - name: action
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
        '401':
          description: Unhauthorized
  /logger/list:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger/list
      operationId: getSetServiceLoggerList
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unhauthorized
  /logger/monitor:
    get:
      tags:
        - Logger
      summary: GET mwsx/logger/monitor
      operationId: getSetMonitorLogger
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int32
        '401':
          description: Unhauthorized
  /statics/sparql/extractProjectVarNames:
    post:
      tags:
        - Statics
      summary: POST mwsx/statics/sparql/extractProjectVarNames
      operationId: postExtractQueryHead
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unhauthorized
  /statics/sparql/templateSize:
    post:
      tags:
        - Statics
      summary: POST mwsx/statics/sparql/templateSize
      operationId: postExtractTemplateSize
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: integer
        '401':
          description: Unhauthorized
  /statics/reporting/request:
    post:
      tags:
        - Statics
      summary: POST mwsx/statics/reporting/request
      operationId: postExtractIssueReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueReportRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileInfo'
        '401':
          description: Unhauthorized
  /system/jdbcDrivers:
    get:
      tags:
        - System
      summary: Returns the available JDBC drivers
      operationId: getJdbcDrivers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JDBCDriver'
        '401':
          description: Unhauthorized
  /system/jdbcDriver/{driver}:
    get:
      tags:
        - System
      summary: Returns information about a specific JDBC driver
      operationId: getJdbcDriver
      parameters:
        - name: driver
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JDBCDriver'
        '401':
          description: Unhauthorized
    delete:
      tags:
        - System
      summary: Adds information about a new JDBC driver to the system
      operationId: DELETEJdbcDrivers
      parameters:
        - name: driver
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JDBCDriver'
        '401':
          description: Unhauthorized
    put:
      tags:
        - System
      summary: Adds information about a new JDBC driver to the system
      operationId: putJdbcDrivers
      parameters:
        - name: driver
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JDBCDriver'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JDBCDriver'
        '401':
          description: Unhauthorized
  /system/jdbcDriver:
    post:
      tags:
        - System
      summary: Adds information about a new JDBC driver to the system
      operationId: postJdbcDrivers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JDBCDriver'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JDBCDriver'
        '401':
          description: Unhauthorized
  /queryTags:
    get:
      tags:
        - QueryTags
      summary: Returns all the available query tags
      operationId: getQueryTags
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tags'
        '401':
          description: Unhauthorized
    post:
      tags:
        - QueryTags
      summary: Adds a new query tag to the set of available tags
      operationId: postQueryTags
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MwsxTag'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        '401':
          description: Unhauthorized
  /queryTags/{tagName}:
    delete:
      tags:
        - QueryTags
      summary: Deletes the given query tag from the list of available tags
      operationId: deleteQueryTagsTagName
      parameters:
        - name: tagName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        '401':
          description: Unhauthorized
  /statistics/accesses:
    get:
      tags:
        - Statistics
      summary: Returns the access log
      operationId: getAccessesStatistics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessLog'
        '401':
          description: Unhauthorized
    post:
      tags:
        - Statistics
      summary: Replace the current access log with the one provided
      operationId: postAccessesStatistics
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AccessLog'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessLog'
        '401':
          description: Unhauthorized
    put:
      tags:
        - Statistics
      summary: Adds the provided access log to the one registered in the system
      operationId: putAccessesStatistics
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AccessLog'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessLog'
        '401':
          description: Unhauthorized
    delete:
      tags:
        - Statistics
      summary: Replace the current access log with the one provided
      operationId: deleteAccessesStatistics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessLog'
        '401':
          description: Unhauthorized
  /statistics/ontologies:
    get:
      tags:
        - Statistics
      summary: Returns the ontologies statistics
      operationId: getOntologiesStatistics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyUsageLog'
        '401':
          description: Unhauthorized
    post:
      tags:
        - Statistics
      summary: Replace the current ontologies statistics with the one provided
      operationId: postOntologiesStatistics
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/OntologyUsageLog'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyUsageLog'
        '401':
          description: Unhauthorized
    put:
      tags:
        - Statistics
      summary: Adds the provided ontologies statistics to the one registered in the system
      operationId: putOntologiesStatistics
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/OntologyUsageLog'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyUsageLog'
        '401':
          description: Unhauthorized
    delete:
      tags:
        - Statistics
      summary: Delete the provided ontologies statistics from the system
      operationId: deleteOntologiesStatistics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyUsageLog'
        '401':
          description: Unhauthorized
  /statistics/{endpoint}/queries:
    get:
      tags:
        - Statistics
      summary: Returns the query statistics for the given endpoint
      operationId: getStatisticsEndpointQueries
      parameters:
        - name: endpoint
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryUsageLog'
        '401':
          description: Unhauthorized
    post:
      tags:
        - Statistics
      summary: Replace the current query statistics with the one provided for the given endpoint
      operationId: postStatisticsEndpointQueries
      parameters:
        - name: endpoint
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/QueryUsageLog'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryUsageLog'
        '401':
          description: Unhauthorized
    put:
      tags:
        - Statistics
      summary: Adds the provided query statistics for the given endpoint to the one registered in the system
      operationId: putStatisticsEndpointQueries
      parameters:
        - name: endpoint
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/QueryUsageLog'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryUsageLog'
        '401':
          description: Unhauthorized
    delete:
      tags:
        - Statistics
      summary: Deletes from the system the query statistics for the given endpoint
      operationId: deleteStatisticsEndpointQueries
      parameters:
        - name: endpoint
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryUsageLog'
        '401':
          description: Unhauthorized
  /statistics/{endpoint}/entities:
    get:
      tags:
        - Statistics
      summary: Returns the entities statistics for the given endpoint
      operationId: getStatisticsEndpointEntities
      parameters:
        - name: endpoint
          in: path
          required: true
          schema:
            type: string
        - name: timestampStart
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: timestampEnd
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EntityUsageLog'
        '401':
          description: Unhauthorized
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-MONOLITH-SESSION-ID
      description: |
        This session ID is generated from Basic Authentication on the login route.
    jwt:
      description: |
        Generate your JWT when you log in. JWT configurations should be placed in `$MASTRO_HOME/config/mastro.jwt` file
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OntologyID:
      title: OntologyID
      type: object
      required:
        - ontologyName
        - ontologyVersion
      properties:
        ontologyVersion:
          type: string
        ontologyName:
          type: string
    MastroID:
      title: MastroID
      type: object
      required:
        - ontologyID
        - mappingID
        - datasourceID
      properties:
        mappingID:
          type: string
        datasourceID:
          type: string
        avpID:
          type: string
        ontologyID:
          $ref: '#/components/schemas/OntologyID'
    OntologyOpeningEvent:
      title: OntologyOpeningEvent
      type: object
      properties:
        deleted:
          type: boolean
          default: false
        onto:
          $ref: '#/components/schemas/OntologyID'
        timestamp:
          type: integer
          format: int64
          default: 0
    KGOpeningEvent:
      title: KGOpeningEvent
      type: object
      properties:
        iri:
          type: string
        timestamp:
          type: integer
          format: int64
          default: 0
    Label:
      title: Label
      type: object
      properties:
        lang:
          type: string
        content:
          type: string
    OntologyEntity:
      title: OntologyEntity
      type: object
      required:
        - entityIRI
      properties:
        entityLabels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        deprecated:
          type: boolean
          default: false
        entityIRI:
          type: string
        entityType:
          type: string
        entityPrefixIRI:
          type: string
        entityRemainder:
          type: string
        entityID:
          type: string
    LicenseInfoDetail:
      title: LicenseInfoDetail
      type: object
      properties:
        detailName:
          enum:
            - SERVER_IP_ADDRESS
            - MAX_NUMBER_OF_USERS_ALLOWED
            - MAX_NUMBER_OF_ONTOLOGIES_ALLOWED
        detailValue:
          type: string
    LicenseInfo:
      title: LicenseInfo
      type: object
      properties:
        licensor:
          type: string
        licensee:
          type: string
        productName:
          type: string
        productVersion:
          type: string
        licenseType:
          type: string
        generationDate:
          type: integer
          format: int64
          default: 0
        expirationDate:
          type: integer
          format: int64
          default: 0
        project:
          type: string
        licenseInfoDetails:
          type: array
          items:
            $ref: '#/components/schemas/LicenseInfoDetail'
    LicenseContactInfo:
      title: LicenseContactInfo
      type: object
      properties:
        licensee:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
    OntologyVersionStorageReport:
      title: OntologyVersionStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        fileCount:
          type: integer
          format: int32
          default: 0
    OntologyStorageReport:
      title: OntologyStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        versions:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/OntologyVersionStorageReport'
        fileCount:
          type: integer
          format: int32
          default: 0
    OntologiesStorageReport:
      title: OntologiesStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        fileCount:
          type: integer
          format: int32
          default: 0
        ontologies:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/OntologyStorageReport'
    SystemFolderStorageReport:
      title: SystemFolderStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        fileCount:
          type: integer
          format: int32
          default: 0
    SystemFoldersStorageReport:
      title: SystemFoldersStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        fileCount:
          type: integer
          format: int32
          default: 0
        systemFoldersStorageReport:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SystemFolderStorageReport'
    KgStorageReport:
      title: KgStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        fileCount:
          type: integer
          format: int32
          default: 0
    KgsStorageReport:
      title: KgsStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        kgs:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/KgStorageReport'
        fileCount:
          type: integer
          format: int32
          default: 0
    SystemStorageReport:
      title: SystemStorageReport
      type: object
      properties:
        totalSize:
          type: integer
          format: int64
          default: 0
        ontologiesStorageReport:
          $ref: '#/components/schemas/OntologiesStorageReport'
        user:
          type: string
        fileCount:
          type: integer
          format: int32
          default: 0
        systemFoldersStorageReport:
          $ref: '#/components/schemas/SystemFoldersStorageReport'
        kgsStorageReport:
          $ref: '#/components/schemas/KgsStorageReport'
        timestamp:
          type: integer
          format: int64
          default: 0
    SystemFolderDeletionReport:
      title: SystemFolderDeletionReport
      type: object
      properties:
        deletedFilesCount:
          type: integer
          format: int32
          default: 0
        deletedFiles:
          type: array
          items:
            type: string
        failedDelationFiles:
          type: array
          items:
            type: string
        freeSpaceCreated:
          type: integer
          format: int64
          default: 0
    SessionSnapshot:
      title: SessionSnapshot
      type: object
      properties:
        expirationTimeText:
          type: string
        expirationTime:
          type: integer
          format: int64
          default: 0
        neverExpires:
          type: boolean
          default: false
        lastUpdate:
          type: integer
          format: int64
          default: 0
        operationsCount:
          type: integer
          format: int32
          default: 0
        startTime:
          type: integer
          format: int64
          default: 0
        id:
          type: string
        user:
          type: string
        startTimeText:
          type: string
    EndpointMemorySnapshot:
      title: MemorySnapshot
      type: object
      properties:
        endpointsMemorySnapshot:
          type: object
    CacheMemorySnapshot:
      title: MemorySnapshot
      type: object
      properties:
        cachedTboxes:
          type: integer
          default: 0
        cachedOwlOntologies:
          type: integer
          default: 0
        cachedClosedOwlOntologies:
          type: integer
          default: 0
        cachedMappingManagers:
          type: integer
          default: 0
        cachedMastroAPIInstances:
          type: integer
          default: 0
        cachedEndpointMastroAPIInstances:
          type: integer
          default: 0
        cachedDataQualityCheckThreads:
          type: integer
          default: 0
        cachedAnnotationProcessorThreads:
          type: integer
          default: 0
        cachedCountEntityInstancesThreads:
          type: integer
          default: 0
        cachedMinMaxDataPropertiesThread:
          type: integer
          default: 0
        cachedInstanceCheckingThreads:
          type: integer
          default: 0
    MemorySnapshot:
      title: MemorySnapshot
      type: object
      properties:
        endpointMemorySnapshot:
          $ref: '#/components/schemas/EndpointMemorySnapshot'
        cacheMemorySnapshot:
          $ref: '#/components/schemas/CacheMemorySnapshot'
    Snapshot:
      title: Snapshot
      type: object
      properties:
        sessions:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SessionSnapshot'
        systemParameters:
          type: object
          additionalProperties:
            type: string
        currentlyActiveSessionCount:
          type: integer
          format: int32
          default: 0
        memorySnapshot:
          $ref: '#/components/schemas/MemorySnapshot'
    MwsxUserLogMessage:
      title: MwsxUserLogMessage
      type: object
      properties:
        userName:
          type: string
        timestamp:
          type: integer
          format: int64
          default: 0
        resource:
          type: string
        method:
          type: string
        templateParams:
          type: object
          additionalProperties:
            type: string
        queryParams:
          type: object
          additionalProperties:
            type: string
        statusCode:
          type: integer
          default: 0
    GeocodingServer:
      title: GeocodingServer
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        user:
          type: string
        password:
          type: string
    GeocodingServers:
      title: GeocodingServers
      type: object
      properties:
        servers:
          type: array
          items:
            $ref: '#/components/schemas/GeocodingServer'
    IssueReportRequest:
      title: IssueReportRequest
      type: object
      properties:
        mappingId:
          type: string
        ontologyVersion:
          type: string
        ontologyName:
          type: string
        errorMessage:
          type: string
        endpointName:
          type: string
        description:
          type: string
        monolithVersion:
          type: string
        datasourceName:
          type: string
        error:
          type: string
        httpMethod:
          type: string
        queryExecutionId:
          type: string
        httpRoute:
          type: string
    FileInfo:
      title: FileInfo
      type: object
      properties:
        fileName:
          type: string
        fileType:
          type: string
        content:
          type: string
    JDBCDriver:
      title: JDBCDriver
      type: object
      properties:
        urlTemplate:
          type: string
        name:
          type: string
        version:
          type: string
    MwsxTag:
      title: MwsxTag
      type: object
      properties:
        color:
          type: string
        name:
          type: string
        description:
          type: string
    Tags:
      title: Tags
      type: object
      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/MwsxTag'
    AccessLog:
      type: object
      title: AccessLog
      required:
        - username
        - timestamp
      properties:
        username:
          type: string
        timestamp:
          type: integer
          format: int64
          default: 0
    OntologyUsageLog:
      type: object
      required:
        - value
        - property
      properties:
        ontology:
          $ref: '#/components/schemas/OntologyID'
        count:
          type: integer
          default: 0
    QueryUsageLog:
      type: object
      title: QueryUsageLog
      required:
        - username
        - timestamp
        - queryCode
      properties:
        username:
          type: string
        timestamp:
          type: integer
          format: int64
          default: 0
        queryCode:
          type: string
    EntityUsageLog:
      type: object
      title: EntityUsageLog
      required:
        - entity
        - count
      properties:
        entity:
          $ref: '#/components/schemas/OntologyEntity'
        count:
          type: integer
          default: 0
