          type: string
    SQLView:
      title: SQLView
      type: object
      properties:
        sqlViewHead:
          type: array
          items:
            type: string
        sqlViewID:
          type: string
        sqlViewDescription:
          type: string
        quarantineReasons:
          type: array
          items:
            type: string
        quarantined:
          type: boolean
          default: false
        sqlViewCode:
          type: string
    MappingAtom:
      title: MappingAtom
      type: object
      properties:
        view:
          $ref: '#/components/schemas/SQLView'
        terms:
          type: array
          items:
            type: string
        name:
          type: string
    MappingBody:
      title: MappingBody
      type: object
      properties:
        bip:
          type: array
          items:
            $ref: '#/components/schemas/MappingAtom'
        viewAtoms:
          type: array
          items:
            $ref: '#/components/schemas/MappingAtom'
    MappingAssertion:
      title: MappingAssertion
      type: object
      required:
        - template
      properties:
        template:
          $ref: '#/components/schemas/MappingTemplate'
        iri:
          $ref: '#/components/schemas/IRI'
        currentEntity:
          $ref: '#/components/schemas/OntologyEntity'
        annotationMappings:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionalAnnotationMapping'
        mappingBody:
          $ref: '#/components/schemas/MappingBody'
        mappingDescription:
          type: string
        rangeTemplate:
          $ref: '#/components/schemas/MappingTemplate'
        quarantineReasons:
          type: array
          items:
            type: string
        userQuery:
          type: string
        id:
          type: string
        quarantined:
          type: boolean
          default: false
        extensionallyComplete:
          type: boolean
          default: false
        rangeLanguageTag:
          type: string
    SQLViews:
      title: SQLViews
      required:
        - sqlViews
      type: object
      properties:
        sqlViews:
          type: array
          items:
            $ref: '#/components/schemas/SQLView'
    MWSXTermDisplacement:
      title: TermDisplacement
      type: object
      properties:
        newPosition:
          type: integer
          format: int32
          default: 0
        oldPosition:
          type: integer
          format: int32
          default: 0
    MWSXMappingViewAtomRefactoring:
      title: MappingViewAtomRefactoring
      type: object
      properties:
        oldSignature:
          type: array
          items:
            type: string
        viewName:
          type: string
        newSqlBody:
          type: string
        keptTerms:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MWSXTermDisplacement'
        addedTerms:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MWSXTermDisplacement'
        newSignature:
          type: array
          items:
            type: string
        removedTerms:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MWSXTermDisplacement'
        newDescription:
          type: string
    MWSXMappingViewAtomRefactoringList:
      title: MappingViewAtomRefactoringList
      type: object
      properties:
        mappingIds:
          type: array
          items:
            type: string
        refactoring:
          $ref: '#/components/schemas/MWSXMappingViewAtomRefactoring'
        keyIds:
          type: array
          items:
            type: string
        denialIds:
          type: array
          items:
            type: string
        inclusionIds:
          type: array
          items:
            type: string
