components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-MONOLITH-SESSION-ID
      description: |
        This session ID is generated from Basic Authentication on the login route.
    jwt:
      description: |
        Generate your JWT when you log in. JWT configurations should be placed in `$MASTRO_HOME/config/mastro.jwt` file
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Prefix:
      title: Prefix
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
    Permission:
      title: Permission
      type: object
      properties:
        domain:
          type: string
        action:
          type: string
        id:
          type: string
    Role:
      title: Role
      type: object
      required:
        - name
        - permissions
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        name:
          type: string
    User:
      title: User
      type: object
      required:
        - name
      properties:
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        name:
          type: string
        email:
          type: string
    Mapping:
      title: Mapping
      type: object
      required:
        - mappingID
        - mappingDate
      properties:
        mappingID:
          type: string
        mappingVersion:
          type: string
        fileName:
          type: string
        mappingDescription:
          type: string
        mappingDate:
          type: integer
          format: int64
          default: 0
        numAssertions:
          type: integer
          format: int32
          default: 0
        numViews:
          type: integer
          format: int32
          default: 0
        numInclusionDependencies:
          type: integer
          format: int32
          default: 0
        prefixes:
          type: array
          items:
            $ref: '#/components/schemas/Prefix'
        numDenials:
          type: integer
          format: int32
          default: 0
        numKeyDependencies:
          type: integer
          format: int32
          default: 0
        fileType:
          type: string
        mappingOwner:
          $ref: '#/components/schemas/User'
    Mappings:
      title: Mappings
      type: object
      required:
        - mappingList
      properties:
        mappingList:
          type: array
          items:
            $ref: '#/components/schemas/Mapping'
    FileInfo:
      title: FileInfo
      type: object
      properties:
        fileName:
          type: string
        fileType:
          type: string
        content:
          type: string
    DatabaseConnection:
      title: DatabaseConnection
      type: object
      properties:
        name:
          type: string
        jdbcURL:
          type: string
        dbUser:
          type: string
        dbDriver:
          type: string
        dbPassword:
          type: string
    MappingInfo:
      title: MappingInfo
      type: object
      required:
        - mapping
        - mappingTemplates
      properties:
        mapping:
          $ref: '#/components/schemas/Mapping'
        mappingTemplates:
          type: array
          items:
            type: string
        mappingDBConnections:
          type: array
          items:
            $ref: '#/components/schemas/DatabaseConnection'
    MappingsCheckResult:
      title: MappingsCheckResult
      type: object
      properties:
        messagesByMappingId:
          type: object
        mappingInfo:
          $ref: '#/components/schemas/MappingInfo'
        success:
          type: boolean
          default: false
        deprecations:
          type: array
          items:
            type: string
    Label:
      title: Label
      type: object
      properties:
        lang:
          type: string
        content:
          type: string
    OntologyEntity:
      title: OntologyEntity
      type: object
      required:
        - entityIRI
      properties:
        entityLabels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        deprecated:
          type: boolean
          default: false
        entityIRI:
          type: string
        entityType:
          type: string
        entityPrefixIRI:
          type: string
        entityRemainder:
          type: string
        entityID:
          type: string
    MappingCount:
      title: MappingCount
      type: object
      required:
        - numberOfMappings
        - entity
      properties:
        numberOfMappings:
          type: integer
          format: int32
          default: 0
        entity:
          $ref: '#/components/schemas/OntologyEntity'
    MappingEntityCount:
      title: MappingEntityCount
      type: object
      required:
        - count
      properties:
        count:
          type: array
          items:
            $ref: '#/components/schemas/MappingCount'
        countAnnotations:
          type: integer
          format: int32
          default: 0
    MWSXTemplateRefactoring:
      title: TemplateRefactoring
      type: object
      properties:
        oldTemplate:
          type: string
        newTemplate:
          type: string
    MappingTemplate:
      title: MappingTemplate
      type: object
      required:
        - template
        - terms
      properties:
        template:
          type: string
        valueTemplate:
          type: boolean
          default: false
        terms:
          type: array
          items:
            type: string
        iriTemplate:
          type: boolean
          default: false
    IRI:
      title: IRI
      type: object
      properties:
        shortIRI:
