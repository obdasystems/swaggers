components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-MONOLITH-SESSION-ID
      description: |
        This session ID is generated from Basic Authentication on the login route.
    jwt:
      description: |
        Generate your JWT when you log in. JWT configurations should be placed in `$MASTRO_HOME/config/mastro.jwt` file
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Label:
      title: Label
      type: object
      properties:
        lang:
          type: string
        content:
          type: string
    Agent:
      title: Agent
      type: object
      properties:
        agentAddress:
          type: string
        agentEmail:
          type: string
        agentLabels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        agentWebsite:
          type: string
        agentIri:
          type: string
    Permission:
      title: Permission
      type: object
      properties:
        domain:
          type: string
        action:
          type: string
        id:
          type: string
    Role:
      title: Role
      type: object
      required:
        - name
        - permissions
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        name:
          type: string
    User:
      title: User
      type: object
      required:
        - name
      properties:
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        name:
          type: string
        email:
          type: string
    KnowledgeGraph:
      title: KnowledgeGraph
      type: object
      properties:
        kgDescriptions:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        kgTitle:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        kgRightsHolder:
          $ref: '#/components/schemas/Agent'
        kgIri:
          type: string
        kgCreator:
          $ref: '#/components/schemas/User'
        kgPublisher:
          $ref: '#/components/schemas/Agent'
        kgTriples:
          type: integer
          format: int64
          default: 0
        kgContributors:
          type: array
          items:
            $ref: '#/components/schemas/User'
        kgCreationTs:
          type: integer
          format: int64
          default: 0
        kgLastModifiedTs:
          type: integer
          format: int64
          default: 0
        kgType:
          type: string
          enum:
            - JENA
            - RDF4J
        prefixes:
          type: object
          additionalProperties:
            type: string
    KGStatus:
      title: KGStatus
      type: object
      properties:
        modelsNumber:
          type: integer
          format: int32
          default: 0
        triplesNumber:
          type: integer
          format: int32
          default: 0
        status:
          type: string
