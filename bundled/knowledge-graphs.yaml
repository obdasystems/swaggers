openapi: 3.0.0
info:
  description: This is the API for managing Knowledge Graphs in Mastro. Knowledge Graphs are RDF materializations powered by RDF4J.
  version: 1.0.0
  title: KG API model
  contact:
    email: info@obdasystems.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: '{protocol}://{tenant}{port}/mws/rest/mwsx'
    variables:
      protocol:
        default: https
      tenant:
        default: localhost
      port:
        default: ':8989'
security:
  - apiKey: []
  - jwt: []
paths:
  /knowledgeGraphs:
    get:
      tags:
        - Persistence
      summary: GET mwsx/knowledgeGraphs
      operationId: getKnowledgeGraphs
      responses:
