title: SPARQLResults
type: object
required: [headTerms, headTypes]
properties:
  headTerms:
    type: array
    items: {type: string}
  headTypes:
    type: object
    additionalProperties:
      type: array
      items: {$ref: SPARQLResultsHeadTypes.yaml}
  construct: {type: boolean, default: false}
  results:
    type: array
    items:
      type: array
      items: {$ref: ./SPARQLResult.yaml}
