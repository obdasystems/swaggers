title: OntologyCatalogEntryStatus
type: object
description: The status of a given ontology catalog entry
properties:
  status:
    type: string
    enum:
      - NOT_INITIALIZED
      - INITIALIZING
      - FINISHED
      - ERROR
    description: The current status of the vector database.
  errorMessage:
    type: string
    description: The error message if the status is ERROR.
  percentage:
    type: integer
    description: The initialization progress percentage (0-100).
  executionTime:
    type: integer
    description: The time taken for the last operation in milliseconds.