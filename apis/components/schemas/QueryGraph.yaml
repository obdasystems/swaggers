required: [graph, head, sparql]
type: object
properties:
  distinct: {type: boolean, default: false}
  count_star: {type: boolean, default: false}
  head:
    type: array
    items: {$ref: ./HeadElement.yaml}
  graph: {$ref: ./GraphElement.yaml}
  activeGraphElementId: {type: string}
  filters:
    type: array
    items: {$ref: ./Filter.yaml}
  optionals:
    type: array
    items: {$ref: ./Optional.yaml}
  limit: {type: integer, default: 0}
  offset: {type: integer, default: 0}
  sparql: {type: string}
