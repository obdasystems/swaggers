    type: object
    additionalProperties: { $ref: ./EntityCount.yaml }
  percentage: { type: number, default: 0 }
  startTime: { type: integer, format: int64, default: 0 }
  endTime: { type: integer, format: int64, default: 0 }
  state:
    type: string
    enum: [RUNNING, READY, FINISHED, ERROR, STOPPED]
