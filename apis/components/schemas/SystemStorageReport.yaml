title: SystemStorageReport
type: object
required:
  - ontologiesStorageReport
  - kgsStorageReport
  - systemFoldersStorageReport
properties:
  totalSize: { type: integer, format: int64, default: 0 }
  ontologiesStorageReport: { $ref: ./OntologiesStorageReport.yaml }
  user: { type: string }
  fileCount: { type: integer, format: int32, default: 0 }
  systemFoldersStorageReport: { $ref: ./SystemFoldersStorageReport.yaml }
  kgsStorageReport: { $ref: ./KgsStorageReport.yaml }
  timestamp: { type: integer, format: int64, default: 0 }
