get:
  tags: [Persistence]
  summary: Returns the SPARQLQuery identified by the passed ID value
  operationId: getOwlOntologyNameVersionQueryID
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: ID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/SPARQLQuery.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [Persistence]
  summary: Updates the definition of a specific query within the available catalog
  operationId: putOwlOntologyNameVersionQueryID
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: ID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/SPARQLQuery.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/SPARQLQuery.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Persistence]
  summary: Removes a specific query from the catalog available for this version of
    the ontology
  operationId: deleteOwlOntologyNameVersionQueryID
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: ID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/SPARQLQuery.yaml}
    '401': {description: Unhauthorized}
