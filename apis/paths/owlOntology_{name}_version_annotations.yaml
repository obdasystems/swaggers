get:
  tags: [Logical]
  summary: GET mwsx/owlOntology/{name}/version/annotations
  operationId: getOwlOntologyNameVersionAlphabetClassIDAnnotations
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  - name: entityIRI
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/Annotation.yaml}
    '401': {description: Unhauthorized}
