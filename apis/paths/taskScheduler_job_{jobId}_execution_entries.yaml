get:
  tags: [Execution]
  summary: Returns the execution entries of the job ID
  operationId: getTaskSchedulerJobExecutionEntries
  parameters:
  - name: jobId
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/MwsxTaskSchedulerJobEntry.yaml}
    '401': {description: Unhauthorized}
