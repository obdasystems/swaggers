get:
  tags: [Query]
  summary: GET mwsx/knowledgeGraph/query/catalog/{queryID}
  operationId: getKnowledgeGraphQueryCatalogQueryID
  parameters:
  - name: queryID
    in: path
    required: true
    schema: {type: string}
  - name: iri
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/SPARQLQuery.yaml}
