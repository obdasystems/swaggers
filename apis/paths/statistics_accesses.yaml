get:
  tags: [Statistics]
  summary: Returns the access log
  operationId: getAccessesStatistics
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/AccessLog.yaml}
    '401': {description: Unhauthorized}
post:
  tags: [Statistics]
  summary: Replace the current access log with the one provided
  operationId: postAccessesStatistics
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items: {$ref: ../components/schemas/AccessLog.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/AccessLog.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [Statistics]
  summary: Adds the provided access log to the one registered in the system
  operationId: putAccessesStatistics
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items: {$ref: ../components/schemas/AccessLog.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/AccessLog.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Statistics]
  summary: Replace the current access log with the one provided
  operationId: deleteAccessesStatistics
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/AccessLog.yaml}
    '401': {description: Unhauthorized}
