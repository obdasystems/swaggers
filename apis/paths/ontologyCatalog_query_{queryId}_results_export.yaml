get:
  tags: [Query]
  summary: GET mwsx/ontologyCatalog/query/{queryId}/results/export
  operationId: getOntologyCatalogQueryResultsExport
  parameters:
  - name: queryId
    in: path
    required: true
    schema: {type: string}
  - name: format
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/octet-stream:
          schema: {type: string, format: binary}
    '401': {description: Unhauthorized}
