  summary: GET mwsx/owlOntology/{name}/version/mapping/{ID}/dependencies/denial/{denyID}
  operationId: getOwlOntologyNameVersionMappingIDDependenciesDenialDenyID
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: ID
    in: path
    required: true
    schema: {type: string}
  - name: denyID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
