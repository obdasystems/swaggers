put:
  tags: [Persistence]
  summary: Overwrite a VKG Snapshot (given its snapshotId) in the catalog for a given
    ontology (name, version)
  operationId: putVkgSnapshot
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: snapshotId
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/VKGSnapshot.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/VKGSnapshot.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Persistence]
  summary: Delete a given VKG Snapshot from catalog for a given ontology (name, version)
  operationId: deleteVkgSnapshot
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: snapshotId
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/VKGSnapshot.yaml}
    '401': {description: Unhauthorized}
