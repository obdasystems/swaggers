put:
  tags: [Persistence]
  summary: PUT mwsx/knowledgeGraph/file
  operationId: patchKnowledgeGraphFile
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/KnowledgeGraphFile.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
delete:
  tags: [Persistence]
  summary: DELETE mwsx/knowledgeGraph/file
  operationId: deleteKnowledgeGraphFile
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/KnowledgeGraphFile.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
get:
  tags: [Persistence]
  summary: GET mwsx/knowledgeGraph/file
  operationId: getKnowledgeGraphFile
  parameters:
  - name: iri
    in: query
    required: true
    schema: {type: string}
  - name: format
    in: query
    required: true
    schema: {type: string}
  - name: namedGraph
    in: query
    required: true
    schema: {type: string}
  - name: fileName
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/FileInfo.yaml}
    '401': {description: Unhauthorized}
