get:
  tags: [NodeRendering]
  summary: Returns the default VKG node rendering for the ontology version
  operationId: getDefaultNodeRendering
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/CustomNodeRenderingMap.yaml}
    '401': {description: Unhauthorized}
post:
  tags: [NodeRendering]
  summary: Set a default VKG node rendering for the ontology version
  operationId: postDefaultNodeRendering
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/CustomNodeRenderingMap.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/CustomNodeRenderingMap.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [NodeRendering]
  summary: Modifies the default VKG node rendering for the ontology version
  operationId: putDefaultNodeRendering
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/CustomNodeRenderingMap.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/CustomNodeRenderingMap.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [NodeRendering]
  summary: DELETE mwsx/owlOntology/{name}/version/vkg/node-rendering
  operationId: deleteVkgNodeRendering
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200': {description: OK}
    '401': {description: Unhauthorized}
