get:
  tags: [Persistence]
  summary: Verifies whether a backup copy of a given mapping file exists
  operationId: getOwlOntologyNameVersionMappingIDBackup
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: mapID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
