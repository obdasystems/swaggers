get:
  tags: [Statistics]
  summary: Returns the ontologies statistics
  operationId: getOntologiesStatistics
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/OntologyUsageLog.yaml}
    '401': {description: Unhauthorized}
post:
  tags: [Statistics]
  summary: Replace the current ontologies statistics with the one provided
  operationId: postOntologiesStatistics
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items: {$ref: ../components/schemas/OntologyUsageLog.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/OntologyUsageLog.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [Statistics]
  summary: Adds the provided ontologies statistics to the one registered in the system
  operationId: putOntologiesStatistics
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items: {$ref: ../components/schemas/OntologyUsageLog.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/OntologyUsageLog.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Statistics]
  summary: Delete the provided ontologies statistics from the system
  operationId: deleteOntologiesStatistics
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/OntologyUsageLog.yaml}
    '401': {description: Unhauthorized}
