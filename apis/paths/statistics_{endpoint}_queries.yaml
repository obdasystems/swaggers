get:
  tags: [Statistics]
  summary: Returns the query statistics for the given endpoint
  operationId: getStatisticsEndpointQueries
  parameters:
  - name: endpoint
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/QueryUsageLog.yaml}
    '401': {description: Unhauthorized}
post:
  tags: [Statistics]
  summary: Replace the current query statistics with the one provided for the given
    endpoint
  operationId: postStatisticsEndpointQueries
  parameters:
  - name: endpoint
    in: path
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items: {$ref: ../components/schemas/QueryUsageLog.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/QueryUsageLog.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [Statistics]
  summary: Adds the provided query statistics for the given endpoint to the one registered
    in the system
  operationId: putStatisticsEndpointQueries
  parameters:
  - name: endpoint
    in: path
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema:
          type: array
          items: {$ref: ../components/schemas/QueryUsageLog.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/QueryUsageLog.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Statistics]
  summary: Deletes from the system the query statistics for the given endpoint
  operationId: deleteStatisticsEndpointQueries
  parameters:
  - name: endpoint
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/QueryUsageLog.yaml}
    '401': {description: Unhauthorized}
