get:
  tags: [Template]
  summary: GET mwsx/owlOntology/{name}/version/mapping/{mapID}/suggestedTemplate/{entityID}
  operationId: getOwlOntologyNameVersionMapIDSuggestedTemplateEntityID
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: mapID
    in: path
    required: true
    schema: {type: string}
  - name: entityID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  - name: projection
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/MappingTemplatePrompt.yaml}
    '401': {description: Unhauthorized}
