get:
  tags: [Query]
  summary: GET mwsx/knowledgeGraph/query/catalog
  operationId: getKnowledgeGraphQueryCatalog
  parameters:
  - name: iri
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/OBDACatalog.yaml}
    '401': {description: Unhauthorized}
post:
  tags: [Query]
  summary: POST mwsx/knowledgeGraph/query/catalog
  operationId: postKnowledgeGraphQueryCatalog
  parameters:
  - name: iri
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/SPARQLQuery.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
