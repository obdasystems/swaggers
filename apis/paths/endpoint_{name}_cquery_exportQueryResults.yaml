post:
  tags: [ConstructQuery]
  summary: Starts the export thread for a construct query on the given endpoint, the
    export thread identifier is returned
  operationId: postOwlOntologyNameVersionCqueryIDExportResults
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/MWSXExportInfo.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        text/plain:
          schema: {type: string}
    '401': {description: Unhauthorized}
