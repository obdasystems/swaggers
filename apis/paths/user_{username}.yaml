get:
  tags: [User]
  summary: Returns the user names <code>username</code>
  operationId: getUserName
  parameters:
  - name: username
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/User.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [User]
  summary: Modifies the user identified by <code>username</code>
  operationId: putUser
  parameters:
  - name: username
    in: path
    required: true
    schema: {type: string}
  - name: onlyInfo
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/User.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/User.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [User]
  summary: DELETE mwsx/user/{username}
  operationId: deleteUser
  parameters:
  - name: username
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/User.yaml}
    '401': {description: Unhauthorized}
