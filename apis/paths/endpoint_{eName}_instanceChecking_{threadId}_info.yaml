get:
  tags: [InstanceChecking]
  summary: Get the info about the queries that will count the number of instances
    of each Class of the ontology
  operationId: getEndpointClassInstanceChecking
  parameters:
  - name: eName
    in: path
    required: true
    schema: {type: string}
  - name: threadId
    in: path
    required: true
    schema: {type: integer, format: int64}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/InstanceCheckingInfo.yaml}
    '401': {description: Unhauthorized}
