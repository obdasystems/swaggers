post:
  tags: [Persistence]
  summary: Download the rejected axioms in OWL2
  operationId: getOntologyDraftDownloadRejectedAxioms
  parameters:
    - name: format
      in: query
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/FileInfo.yaml
    required: true
  responses:
    "200":
      description: Successful operation
      content:
        application/json:
          schema: { $ref: ../components/schemas/FileInfo.yaml }
    "401": { description: Unhauthorized }
