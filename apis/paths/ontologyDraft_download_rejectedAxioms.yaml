post:
  tags: [Persistence]
  summary: Download the rejected axioms in OWL2
  operationId: getOntologyDraftDownloadRejectedAxioms
  parameters:
    - name: format
      in: query
      schema:
        type: string
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
    required: true
  responses:
    "200":
      description: Successful operation
      content:
        text/plain:
          schema: { type: string }
    "401": { description: Unhauthorized }
