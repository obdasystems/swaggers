get:
  tags: [Query]
  summary: Returns the query record info of all the queries running on the given endpoint
  operationId: getOwlOntologyNameVersionQueryIDRecordInfos
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/QueryRecordInfo.yaml}
    '401': {description: Unhauthorized}
