put:
  tags: [RAG]
  summary: Ask for AI support in ontology design.
  operationId: putOntologyDraftAI
  parameters:
    - name: name
      in: path
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            text: { type: string }
            currentRdfGraph: { $ref: ../components/schemas/RDFGraph.yaml }
            iriStyle:
              type: boolean
              default: true
              description: "`True` for camelCase, `False` for snake_case"
            simpleNameLanguage:
              type: string
              default: "en"
              description: 'Language used for generating the variable part of entity IRIs. Value must be in ISO 2 chars format. Default "en"'
            annotationLanguage:
              type: string
              default: "it"
              description: 'Language used for generating annotations on entities. Namely "rdfs:label" and "rdfs:comment". Value must be in ISO 2 chars format. Default "it"'
  responses:
    "200":
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RDFGraph.yaml
    "401": { description: Unhauthorized }
