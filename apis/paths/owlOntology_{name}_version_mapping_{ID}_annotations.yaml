get:
  tags: [IntensionalAnnotation]
  summary: GET mwsx/owlOntology/{name}/version/mapping/{ID}/annotations
  operationId: getOwlOntologyNameVersionIntensionalAnnotationMapping
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: ID
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
