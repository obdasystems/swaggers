get:
  tags: [ExportedQuery]
  summary: Returns the first 'lines' lines of the exported file content
  operationId: getOwlOntologyNameVersionQueryIDExportThreadIdPreview
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: id
    in: path
    required: true
    schema: {type: string}
  - name: lines
    in: path
    required: true
    schema: {type: integer, format: int32}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/CsvPreview.yaml}
    '401': {description: Unhauthorized}
