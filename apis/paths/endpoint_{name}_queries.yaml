get:
  tags: [Query]
  summary: Returns the current state of all the queries in status <code>status</code>
    loaded in the endpoint named <code>name</code>
  operationId: listQueryStatusesOnEndpoint
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: status
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/SPARQLStatus.yaml}
    '401': {description: Unhauthorized}
