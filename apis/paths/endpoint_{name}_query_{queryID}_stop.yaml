put:
  tags: [Query]
  summary: Forces the termination of the query running on the given endpoint
  operationId: stopCatalogQueryOnEndpoint
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: queryID
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: integer}
    '401': {description: Unhauthorized}
