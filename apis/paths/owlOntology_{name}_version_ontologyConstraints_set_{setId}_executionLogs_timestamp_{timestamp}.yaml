get:
  tags: [CheckSet]
  summary: Returns the execution log of a check set run at the provided timestamp
  operationId: getOntologyConstraintsCheckSetIdExecutionTimestamp
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: setId
    in: path
    required: true
    schema: {type: string}
  - name: timestamp
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/DataQualityCheckSetExecutionLog.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [CheckSet]
  summary: Deletes the execution log of a check set run at the provided timestamp
  operationId: deleteOntologyConstraintsCheckSetIdExecutionTimestamp
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: setId
    in: path
    required: true
    schema: {type: string}
  - name: timestamp
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/DataQualityCheckSetExecutionLog.yaml}
    '401': {description: Unhauthorized}
