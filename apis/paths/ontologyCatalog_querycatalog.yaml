get:
  tags: [Query]
  summary: Returns the query catalog available for the given version of the ontology
  operationId: getOntologycatalogQuerycatalog
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/OBDACatalog.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Query]
  summary: Deletes the query catalog available for the given version of the ontology
  operationId: deleteOntologycatalogQuerycatalog
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/OBDACatalog.yaml}
    '401': {description: Unhauthorized}
