post:
  tags: [FileSystem]
  summary: POST mwsx/knowledgeGraph/store/file
  operationId: postKnowledgeGraphStoreFile
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/FileInfo.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
get:
  tags: [FileSystem]
  summary: GET mwsx/knowledgeGraph/store/file
  operationId: getKnowledgeGraphStoreFile
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/KGStoreFileInfoEntry.yaml}
    '401': {description: Unhauthorized}
