get:
  tags: [Visualize]
  summary: 'Returns the RDFGraph file of the version ''version'' of the ontology named
    <code>name</code>.<br/> '
  operationId: getOwlOntologyNameVersionGscape
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/FileInfo.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [Visualize]
  summary: 'Deletes the RDFGraph file of the version ''version'' of the ontology named
    <code>name</code>.<br/> '
  operationId: deleteOwlOntologyNameVersionGscape
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/FileInfo.yaml}
    '401': {description: Unhauthorized}
