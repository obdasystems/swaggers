delete:
  tags: [FileSystem]
  summary: DELETE mwsx/knowledgeGraph/store/file/{name}
  operationId: deleteKnowledgeGraphStoreFile
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
get:
  tags: [FileSystem]
  summary: GET mwsx/knowledgeGraph/store/file/{name}
  operationId: getKnowledgeGraphStoreFileName
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/KGStoreFileInfoEntry.yaml}
    '401': {description: Unhauthorized}
