get:
  tags: [CheckSet]
  summary: Returns a check set defined over the ontology / version
  operationId: getOntologyConstraintsCheckSetSetId
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: setId
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/DataQualityCheckSet.yaml}
    '401': {description: Unhauthorized}
delete:
  tags: [CheckSet]
  summary: Deletes the given check set from
  operationId: deleteOntologyConstraintsCheckSetSetId
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: setId
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/DataQualityCheckSet.yaml}
    '401': {description: Unhauthorized}
put:
  tags: [CheckSet]
  summary: Updates the definition of a specific check set
  operationId: putOntologyConstraintsCheck
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: setId
    in: path
    required: true
    schema: {type: string}
  - name: version
    in: query
    required: true
    schema: {type: string}
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/DataQualityCheckSet.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {type: boolean}
    '401': {description: Unhauthorized}
