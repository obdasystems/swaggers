get:
  tags: [Query]
  summary: Returns the IDs of queries loaded in the given endpoint
  operationId: listQueryIdsOnEndpoint
  parameters:
  - name: name
    in: path
    required: true
    schema: {type: string}
  - name: status
    in: query
    required: true
    schema: {type: string}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {type: string}
    '401': {description: Unhauthorized}
