get:
  tags: [Persistence]
  summary: GET mwsx/knowledgeGraphs
  operationId: getKnowledgeGraphs
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items: {$ref: ../components/schemas/KnowledgeGraph.yaml}
    '401': {description: Unhauthorized}
post:
  tags: [Persistence]
  summary: POST mwsx/knowledgeGraphs
  operationId: postKnowledgeGraphs
  requestBody:
    content:
      application/json:
        schema: {$ref: ../components/schemas/KnowledgeGraph.yaml}
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema: {$ref: ../components/schemas/KnowledgeGraph.yaml}
    '401': {description: Unhauthorized}
